<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Special+Elite&display=swap" rel="stylesheet">
    <title>Array</title>
</head>
<body>
    <h2>Eu posso ser fácil ou um beco sem saída. Cuidado quando você me cruzar. O que eu sou?</h2>
    <input type="text" id="nome" placeholder="Digite o seu chute">
    
        <div>
            <br>
            <button onclick="adicionar(), mostrar()" class="butao">Enviar resposta:</button>
        </div>

    <p id="resultado"></p>

    <br>
    <p>Vermelho é errado e verde é certo</p>

    <script>
        let nomes = [];
        resposta_certa = "rua";
        

        function adicionar(){
            let nome = document.getElementById("nome").value.toLowerCase()
            if(nome !=""){
                nomes.push(nome);
                document.getElementById("nome").value = "";
                
            }
            if(nome == resposta_certa){
                resultado.classList.add("certo");
                resultado.classList.remove("errado");
            } else {
                console.log("errado")
                resultado.classList.add("errado");
            }
            
        }
        

        function mostrar(){
            let texto = "Nomes cadastrados: <br>"
            for(let i = 0; i <nomes.length; i++){
                texto += nomes[i] + "<br>";
            }
            
            document.getElementById("resultado").innerHTML = texto;
        }

    </script>
</body>
<!-- <script src="array.js"></script> -->

</html>
