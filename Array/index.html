<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Special+Elite&display=swap" rel="stylesheet">
    <title>Array</title>
</head>
<body>
    <h2>Cadastro de nomes:</h2>
    <input type="text" id="nome" placeholder="Digite um nome">
        <div>
            <button onclick="adicionar()" class="butao">Cadastrar</button>
            <button onclick="mostrar()" class="butao">Mostrar Lista</button>
        </div>

    <p id="resultado"></p>

    <script>
        let nomes = [];

        function adicionar(){
            let nome = document.getElementById("nome").value
            if(nome !=""){
                nomes.push(nome);
                document.getElementById("nome").value = "";
            }
        }

        function mostrar(){
            let texto = "Nomes cadastrados: <br>"
            for(let i = 0; i <nomes.length; i++){
                texto += nomes[i] + "<br>";
            }
            document.getElementById("resultado").innerHTML = texto;
        }

    </script>
</body>
<!-- <script src="array.js"></script> -->
<script src="array2.js"></script>
</html>
